<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{% block title %}SafeBank Companion{% endblock %}</title>
  <link rel="stylesheet" href="/static/css/style.css" />
</head>
<body>
  <header class="site-header">
    <a class="brand" href="/">🛡️ SafeBank Companion</a>
    <nav>
      <a href="/chat">Chat</a>
    </nav>
  </header>

  <main class="site-main">
    {% block content %}{% endblock %}
  </main>

  <footer class="site-footer">
    <p>
      SafeBank Companion provides fraud-awareness education only. It does not
      provide legal, investment, or financial advice. For urgent issues,
      always contact your bank's official customer support channel.
    </p>
  </footer>

  {% block scripts %}{% endblock %}
</body>
</html>
